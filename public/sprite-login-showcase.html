<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HabitHero Sprite Login Showcase</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap");

      :root {
        color-scheme: dark;
        --ink: #f7fffb;
        --soft: rgba(229, 255, 251, 0.74);
        --panel: rgba(4, 35, 47, 0.46);
        --panel-strong: rgba(5, 54, 67, 0.58);
        --line: rgba(185, 246, 255, 0.24);
        --glow: #90f3ff;
        --leaf: #b8ef7e;
        --blue: #2bc7ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #073847;
        font-family: "Nunito", system-ui, sans-serif;
      }

      body {
        min-width: 320px;
      }

      #scene {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        user-select: none;
      }

      .vignette,
      .sun-haze,
      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .vignette {
        background:
          radial-gradient(circle at 42% 32%, transparent 0 36%, rgba(2, 23, 34, 0.2) 64%, rgba(1, 13, 22, 0.7) 100%),
          linear-gradient(90deg, rgba(1, 15, 24, 0.42), transparent 38%, rgba(1, 20, 31, 0.18));
      }

      .sun-haze {
        background:
          radial-gradient(circle at 35% 6%, rgba(255, 255, 218, 0.34), transparent 24%),
          radial-gradient(circle at 70% 18%, rgba(108, 234, 255, 0.2), transparent 32%);
        mix-blend-mode: screen;
      }

      .grain {
        opacity: 0.12;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: radial-gradient(circle at center, transparent 0 32%, black 85%);
      }

      .shell {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(312px, 390px);
        align-items: center;
        gap: clamp(20px, 4vw, 64px);
        padding: clamp(20px, 4vw, 56px);
        pointer-events: none;
      }

      .copy {
        align-self: start;
        max-width: 560px;
        margin-top: clamp(34px, 8vh, 86px);
        color: var(--ink);
        text-shadow: 0 12px 44px rgba(0, 22, 31, 0.78);
      }

      h1 {
        margin: 0;
        font-family: "Fredoka", system-ui, sans-serif;
        font-size: clamp(44px, 8vw, 104px);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .copy p {
        max-width: 28rem;
        margin: 14px 0 0;
        color: rgba(236, 255, 252, 0.84);
        font-size: clamp(16px, 1.7vw, 20px);
        line-height: 1.7;
      }

      .login-panel {
        pointer-events: auto;
        width: 100%;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04)),
          var(--panel);
        color: var(--ink);
        box-shadow: 0 28px 80px rgba(0, 18, 30, 0.42), inset 0 1px rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(24px) saturate(130%);
      }

      .panel-head {
        margin-bottom: 20px;
      }

      .panel-head h2 {
        margin: 0;
        font-family: "Fredoka", system-ui, sans-serif;
        font-size: 27px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      label {
        display: block;
        margin: 13px 0 7px;
        color: rgba(236, 255, 252, 0.82);
        font-size: 13px;
        font-weight: 800;
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(184, 251, 255, 0.22);
        border-radius: 8px;
        padding: 0 13px;
        outline: none;
        background: rgba(3, 42, 56, 0.54);
        color: var(--ink);
        font: 700 16px "Nunito", system-ui, sans-serif;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      input:focus {
        border-color: rgba(155, 244, 255, 0.9);
        box-shadow: 0 0 0 4px rgba(43, 199, 255, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 50px;
        margin-top: 18px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        color: #07303e;
        background: linear-gradient(135deg, #f2ff9b, #75f5df 48%, #34c4ff);
        font: 900 16px "Nunito", system-ui, sans-serif;
        touch-action: manipulation;
        box-shadow: 0 18px 38px rgba(36, 215, 230, 0.26);
        transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
      }

      .primary:hover {
        transform: translateY(-1px);
        filter: saturate(1.08) brightness(1.04);
        box-shadow: 0 22px 46px rgba(36, 215, 230, 0.34);
      }

      .primary:focus-visible {
        outline: 3px solid rgba(242, 255, 155, 0.78);
        outline-offset: 3px;
      }

      .loading {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 38%, #147486, #052835 76%);
        color: #eafffb;
        font-family: "Fredoka", system-ui, sans-serif;
        font-size: 18px;
        transition: opacity 500ms ease, visibility 500ms ease;
      }

      .loading.hide {
        opacity: 0;
        visibility: hidden;
      }

      @media (max-width: 860px) {
        .shell {
          grid-template-columns: 1fr;
          align-items: end;
          padding: 18px;
        }

        .copy {
          align-self: start;
          margin-top: 46px;
          margin-bottom: 0;
        }

        .copy p {
          max-width: 21rem;
          font-size: 15px;
          line-height: 1.55;
        }

        .login-panel {
          max-width: 460px;
          margin-inline: auto;
          padding: 18px;
        }
      }

      @media (max-width: 520px) {
        .copy {
          max-width: 300px;
        }

        h1 {
          font-size: clamp(38px, 14vw, 58px);
        }

        .panel-head h2 {
          font-size: 23px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .primary,
        .loading {
          transition: none;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="scene" aria-label="森林漂浮島與絨毛精靈的互動 3D 場景"></canvas>
    <div class="sun-haze"></div>
    <div class="vignette"></div>
    <div class="grain"></div>

    <main class="shell">
      <section class="copy" aria-label="HabitHero 登入視覺">
        <h1>HabitHero</h1>
        <p>讓孩子每天的小任務，像走進一座會發光的森林。</p>
      </section>

      <form class="login-panel" aria-label="登入展示表單">
        <div class="panel-head">
          <h2>回到你的冒險</h2>
        </div>
        <label for="family">家庭代號</label>
        <input id="family" value="MOSS-742" autocomplete="off" />
        <label for="password">通關密語</label>
        <input id="password" type="password" value="habithero" autocomplete="current-password" />
        <button class="primary" type="button">登入任務森林</button>
      </form>
    </main>

    <div class="loading" id="loading">正在喚醒森林精靈...</div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const canvas = document.querySelector("#scene");
      const loading = document.querySelector("#loading");
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

      let reducedMotion = prefersReducedMotion.matches;
      let paused = reducedMotion;
      let mobileLift = 0;
      let last = performance.now();
      let targetParallax = new THREE.Vector2();
      let parallax = new THREE.Vector2();
      let pointerDown = null;
      const interactiveBubbles = [];
      const sparkles = [];

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x0b6d7d, 0.032);

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
        powerPreference: "high-performance"
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.12;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 120);
      camera.position.set(0.1, 2.2, 9.2);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.055;
      controls.enablePan = false;
      controls.minDistance = 5.4;
      controls.maxDistance = 12.5;
      controls.maxPolarAngle = Math.PI * 0.55;
      controls.minPolarAngle = Math.PI * 0.23;
      controls.target.set(0, 0.9, 0);
      controls.autoRotate = !reducedMotion;
      controls.autoRotateSpeed = 0.34;

      const hemi = new THREE.HemisphereLight(0xd9ffff, 0x0b4450, 1.8);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xfaffce, 4.2);
      sun.position.set(-4.8, 7.2, 4.6);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.left = -7;
      sun.shadow.camera.right = 7;
      sun.shadow.camera.top = 7;
      sun.shadow.camera.bottom = -7;
      scene.add(sun);

      const rim = new THREE.PointLight(0x62eaff, 22, 13, 2.1);
      rim.position.set(3.6, 2.8, -2.4);
      scene.add(rim);

      const glow = new THREE.PointLight(0xbaff8e, 12, 8, 2);
      glow.position.set(-2.6, 1.2, 2.6);
      scene.add(glow);

      const gradient = new THREE.Mesh(
        new THREE.SphereGeometry(60, 48, 32),
        new THREE.ShaderMaterial({
          side: THREE.BackSide,
          depthWrite: false,
          uniforms: {
            top: { value: new THREE.Color(0x7fe7ea) },
            middle: { value: new THREE.Color(0x178ea0) },
            bottom: { value: new THREE.Color(0x06324b) }
          },
          vertexShader: "varying vec3 vWorld; void main(){ vec4 w = modelMatrix * vec4(position, 1.0); vWorld = normalize(w.xyz); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }",
          fragmentShader: "uniform vec3 top; uniform vec3 middle; uniform vec3 bottom; varying vec3 vWorld; void main(){ float h = clamp(vWorld.y * 0.5 + 0.5, 0.0, 1.0); vec3 c = mix(bottom, middle, smoothstep(0.05, 0.55, h)); c = mix(c, top, smoothstep(0.48, 1.0, h)); gl_FragColor = vec4(c, 1.0); }"
        })
      );
      scene.add(gradient);

      function roundedCapsuleTexture() {
        const size = 256;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        const g = ctx.createRadialGradient(84, 74, 18, 128, 128, 132);
        g.addColorStop(0, "rgba(255,255,255,0.95)");
        g.addColorStop(0.16, "rgba(218,255,255,0.82)");
        g.addColorStop(0.52, "rgba(84,223,255,0.25)");
        g.addColorStop(1, "rgba(25,117,144,0)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, size, size);
        const tex = new THREE.CanvasTexture(canvas);
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
      }

      const softDisc = roundedCapsuleTexture();

      function makeIsland() {
        const group = new THREE.Group();
        group.position.y = -0.52;

        const earth = new THREE.Mesh(
          new THREE.CylinderGeometry(2.72, 1.34, 1.08, 96, 1, false),
          new THREE.MeshStandardMaterial({
            color: 0x24412d,
            roughness: 0.92,
            metalness: 0.02
          })
        );
        earth.position.y = -0.52;
        earth.castShadow = true;
        earth.receiveShadow = true;
        group.add(earth);

        const underside = new THREE.Mesh(
          new THREE.ConeGeometry(1.46, 1.86, 86),
          new THREE.MeshStandardMaterial({
            color: 0x193021,
            roughness: 1
          })
        );
        underside.position.y = -1.98;
        underside.castShadow = true;
        group.add(underside);

        const grassTop = new THREE.Mesh(
          new THREE.SphereGeometry(2.76, 96, 24, 0, Math.PI * 2, 0, Math.PI * 0.46),
          new THREE.MeshStandardMaterial({
            color: 0x77a947,
            roughness: 0.78,
            metalness: 0,
            emissive: 0x163a22,
            emissiveIntensity: 0.14
          })
        );
        grassTop.scale.set(1, 0.22, 0.66);
        grassTop.position.y = 0.08;
        grassTop.receiveShadow = true;
        group.add(grassTop);

        const bladeMat = new THREE.MeshStandardMaterial({
          color: 0xb6e771,
          roughness: 0.88,
          side: THREE.DoubleSide
        });
        const bladeGeom = new THREE.ConeGeometry(0.018, 0.34, 5);
        const blades = new THREE.InstancedMesh(bladeGeom, bladeMat, 560);
        const dummy = new THREE.Object3D();
        for (let i = 0; i < 560; i++) {
          const r = Math.sqrt(Math.random()) * 2.55;
          const a = Math.random() * Math.PI * 2;
          const x = Math.cos(a) * r;
          const z = Math.sin(a) * r * 0.62;
          const edge = r / 2.55;
          dummy.position.set(x, 0.13 + Math.random() * 0.08 - edge * 0.05, z);
          dummy.rotation.set(Math.random() * 0.38, a + Math.PI * 0.5, Math.random() * 0.22);
          const s = THREE.MathUtils.lerp(0.45, 1.15, Math.random()) * (1 - edge * 0.25);
          dummy.scale.setScalar(s);
          dummy.updateMatrix();
          blades.setMatrixAt(i, dummy.matrix);
        }
        blades.castShadow = true;
        group.add(blades);

        const flowerMat = new THREE.MeshBasicMaterial({ color: 0xc5fbff, transparent: true, opacity: 0.76 });
        const flowerGeom = new THREE.CircleGeometry(0.045, 7);
        for (let i = 0; i < 22; i++) {
          const r = 0.35 + Math.random() * 2.05;
          const a = Math.random() * Math.PI * 2;
          const f = new THREE.Mesh(flowerGeom, flowerMat);
          f.position.set(Math.cos(a) * r, 0.31, Math.sin(a) * r * 0.58);
          f.rotation.x = -Math.PI / 2;
          group.add(f);
        }

        return group;
      }

      const island = makeIsland();
      scene.add(island);

      function createHairLines(count, radius, colorA, colorB, hemisphere = false) {
        const positions = [];
        const colors = [];
        const ca = new THREE.Color(colorA);
        const cb = new THREE.Color(colorB);
        for (let i = 0; i < count; i++) {
          const theta = Math.random() * Math.PI * 2;
          const y = hemisphere ? Math.random() * 1.75 - 0.45 : Math.random() * 2 - 1;
          const rr = Math.sqrt(Math.max(0.02, 1 - y * y));
          const normal = new THREE.Vector3(Math.cos(theta) * rr, y, Math.sin(theta) * rr).normalize();
          const base = normal.clone().multiplyScalar(radius * THREE.MathUtils.lerp(0.86, 1.02, Math.random()));
          const length = THREE.MathUtils.lerp(0.16, 0.42, Math.random()) * (normal.y > 0.35 ? 1.3 : 1);
          const tip = base.clone().add(normal.clone().multiplyScalar(length));
          tip.x += (Math.random() - 0.5) * 0.08;
          tip.z += (Math.random() - 0.5) * 0.08;
          positions.push(base.x, base.y, base.z, tip.x, tip.y, tip.z);
          const c = ca.clone().lerp(cb, Math.random() * 0.72);
          colors.push(c.r, c.g, c.b, c.r, c.g, c.b);
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        geom.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
        return new THREE.LineSegments(
          geom,
          new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.72,
            blending: THREE.AdditiveBlending
          })
        );
      }

      function createCreature() {
        const root = new THREE.Group();
        root.position.set(0.4, 0.1, 0.08);

        const body = new THREE.Mesh(
          new THREE.SphereGeometry(1.13, 96, 64),
          new THREE.MeshPhysicalMaterial({
            color: 0xf7fffa,
            roughness: 0.72,
            sheen: 1,
            sheenColor: 0xeaffff,
            clearcoat: 0.18,
            emissive: 0x1ea5cb,
            emissiveIntensity: 0.025
          })
        );
        body.scale.set(1.07, 0.96, 0.98);
        body.castShadow = true;
        body.receiveShadow = true;
        root.add(body);

        const bluePatch = new THREE.Mesh(
          new THREE.SphereGeometry(1.132, 64, 42),
          new THREE.MeshPhysicalMaterial({
            color: 0x39cfff,
            roughness: 0.82,
            transparent: true,
            opacity: 0.64,
            sheen: 1,
            side: THREE.FrontSide
          })
        );
        bluePatch.scale.set(1.02, 0.94, 0.98);
        bluePatch.position.set(0.43, -0.05, -0.05);
        bluePatch.rotation.z = -0.14;
        root.add(bluePatch);

        const hair = createHairLines(1450, 1.04, 0xffffff, 0xa7f3ff, true);
        hair.scale.copy(body.scale);
        root.add(hair);

        const eyeMat = new THREE.MeshPhysicalMaterial({
          color: 0x06355e,
          roughness: 0.02,
          metalness: 0,
          transmission: 0.12,
          thickness: 0.55,
          clearcoat: 1,
          clearcoatRoughness: 0.02,
          emissive: 0x00a8e6,
          emissiveIntensity: 0.16
        });
        const eyeGeom = new THREE.SphereGeometry(0.245, 48, 32);
        const eyes = [];
        [-0.35, 0.35].forEach((x) => {
          const eye = new THREE.Mesh(eyeGeom, eyeMat);
          eye.position.set(x, 0.26, 0.94);
          eye.scale.set(0.86, 1.13, 0.42);
          eye.castShadow = true;
          root.add(eye);
          eyes.push(eye);

          const highlight = new THREE.Mesh(
            new THREE.SphereGeometry(0.05, 18, 12),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
          );
          highlight.position.set(x - 0.06, 0.38, 1.055);
          highlight.scale.set(1, 1, 0.42);
          root.add(highlight);
        });

        const cheekMat = new THREE.MeshBasicMaterial({ color: 0xff9fc3, transparent: true, opacity: 0.23, depthWrite: false });
        [-0.58, 0.58].forEach((x) => {
          const cheek = new THREE.Mesh(new THREE.CircleGeometry(0.16, 32), cheekMat);
          cheek.position.set(x, 0.02, 1.06);
          cheek.scale.set(1.3, 0.68, 1);
          root.add(cheek);
        });

        const nose = new THREE.Mesh(
          new THREE.SphereGeometry(0.026, 16, 12),
          new THREE.MeshStandardMaterial({ color: 0x8a5355, roughness: 0.3 })
        );
        nose.position.set(0, 0.06, 1.13);
        root.add(nose);

        const mouthGeom = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(-0.045, -0.055, 1.135),
          new THREE.Vector3(0, -0.082, 1.148),
          new THREE.Vector3(0.045, -0.055, 1.135)
        ]);
        const mouth = new THREE.Line(mouthGeom, new THREE.LineBasicMaterial({ color: 0x32505a, transparent: true, opacity: 0.78 }));
        root.add(mouth);

        const earMat = new THREE.MeshPhysicalMaterial({ color: 0x34c9ff, roughness: 0.58, sheen: 1 });
        const innerEarMat = new THREE.MeshBasicMaterial({ color: 0xc9f9ff, transparent: true, opacity: 0.58 });
        [-1, 1].forEach((side) => {
          const ear = new THREE.Mesh(new THREE.ConeGeometry(0.31, 0.58, 36), earMat);
          ear.position.set(side * 0.74, 0.56, 0.08);
          ear.rotation.set(0.4, 0, side * -0.74);
          ear.castShadow = true;
          root.add(ear);

          const inner = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.34, 28), innerEarMat);
          inner.position.set(side * 0.75, 0.55, 0.18);
          inner.rotation.copy(ear.rotation);
          root.add(inner);
        });

        const footMat = new THREE.MeshPhysicalMaterial({ color: 0x1db9ee, roughness: 0.64, sheen: 0.8 });
        const feet = [];
        [-0.45, 0.45].forEach((x) => {
          const foot = new THREE.Mesh(new THREE.SphereGeometry(0.22, 32, 20), footMat);
          foot.position.set(x, -0.89, 0.44);
          foot.scale.set(1.25, 0.46, 0.82);
          foot.castShadow = true;
          root.add(foot);
          feet.push(foot);
        });

        const antennaMat = new THREE.LineBasicMaterial({ color: 0xdbffff, transparent: true, opacity: 0.88 });
        const tipMat = new THREE.MeshBasicMaterial({ color: 0x39c8ff, transparent: true, opacity: 0.82, blending: THREE.AdditiveBlending });
        const antennas = [];
        [-0.28, 0.34].forEach((x, i) => {
          const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(x, 0.95, 0.16),
            new THREE.Vector3(x * 0.86, 1.34, 0.16),
            new THREE.Vector3(x + (i ? 0.22 : -0.08), 1.65, 0.04),
            new THREE.Vector3(x + (i ? 0.48 : -0.18), 1.82, 0.08)
          ]);
          const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(24)), antennaMat);
          root.add(line);
          const plume = createHairLines(110, 0.16, 0x4cd8ff, 0xffffff, false);
          plume.position.copy(curve.points[curve.points.length - 1]);
          plume.scale.set(0.78, 0.44, 0.78);
          root.add(plume);
          antennas.push({ line, plume, basePoints: curve.points.map((p) => p.clone()), side: i ? 1 : -1 });
        });

        root.userData = { body, hair, eyes, feet, antennas };
        return root;
      }

      const creature = createCreature();
      scene.add(creature);

      function makeBubble(radius, position, speed, phase) {
        const group = new THREE.Group();
        group.position.copy(position);
        group.userData = { base: position.clone(), speed, phase, radius, pop: 0, alive: true };
        const shell = new THREE.Mesh(
          new THREE.SphereGeometry(radius, 48, 32),
          new THREE.MeshPhysicalMaterial({
            color: 0xbafcff,
            roughness: 0.03,
            metalness: 0,
            transmission: 0.72,
            thickness: 0.34,
            transparent: true,
            opacity: 0.24,
            clearcoat: 1,
            clearcoatRoughness: 0.02,
            envMapIntensity: 1.5
          })
        );
        group.add(shell);

        const wire = new THREE.Mesh(
          new THREE.SphereGeometry(radius * 1.006, 48, 20),
          new THREE.MeshBasicMaterial({
            color: 0xd9ffff,
            transparent: true,
            opacity: 0.24,
            wireframe: true
          })
        );
        group.add(wire);

        const highlight = new THREE.Sprite(
          new THREE.SpriteMaterial({
            map: softDisc,
            color: 0xffffff,
            transparent: true,
            opacity: 0.84,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          })
        );
        highlight.position.set(-radius * 0.36, radius * 0.34, radius * 0.68);
        highlight.scale.set(radius * 0.92, radius * 0.92, 1);
        group.add(highlight);

        scene.add(group);
        interactiveBubbles.push(group);
        return group;
      }

      [
        [0.45, [-4.1, 1.45, 1.3], 0.12, 0.1],
        [0.32, [3.3, 4.8, -1.8], 0.08, 1.4],
        [0.18, [-1.85, 2.2, 0.6], 0.18, 2.6],
        [0.16, [-2.95, 0.58, 1.4], 0.2, 3.1],
        [0.13, [-2.12, 1.2, 1.1], 0.22, 4.4],
        [0.14, [2.7, -1.28, 1.7], 0.16, 2.1],
        [0.23, [-4.0, -2.25, 2.4], 0.11, 5.2],
        [0.09, [0.9, 3.28, -1.0], 0.2, 4.8]
      ].forEach(([r, p, s, phase]) => makeBubble(r, new THREE.Vector3(...p), s, phase));

      function makeLeaves() {
        const group = new THREE.Group();
        group.position.set(-3.2, 4.5, 1.1);
        group.rotation.set(0.2, -0.25, -0.05);

        const branchMat = new THREE.MeshStandardMaterial({ color: 0x496d28, roughness: 0.8 });
        const leafMat = new THREE.MeshStandardMaterial({
          color: 0x80bb44,
          roughness: 0.64,
          side: THREE.DoubleSide,
          emissive: 0x173c19,
          emissiveIntensity: 0.1
        });
        const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.055, 2.6, 10), branchMat);
        branch.rotation.z = 0.95;
        group.add(branch);

        const leafShape = new THREE.Shape();
        leafShape.moveTo(0, 0.46);
        leafShape.bezierCurveTo(0.3, 0.28, 0.3, -0.28, 0, -0.48);
        leafShape.bezierCurveTo(-0.3, -0.28, -0.3, 0.28, 0, 0.46);
        const leafGeom = new THREE.ShapeGeometry(leafShape, 18);
        for (let i = 0; i < 18; i++) {
          const leaf = new THREE.Mesh(leafGeom, leafMat);
          const t = i / 17;
          leaf.position.set(THREE.MathUtils.lerp(-1.25, 1.05, t), Math.sin(t * 6) * 0.18, Math.cos(t * 4) * 0.22);
          leaf.rotation.set(Math.random() * 0.45, Math.random() * 0.55, (i % 2 ? -0.9 : 0.9) + Math.random() * 0.25);
          leaf.scale.setScalar(THREE.MathUtils.lerp(0.52, 0.88, Math.random()));
          leaf.castShadow = true;
          group.add(leaf);
        }
        return group;
      }
      const leaves = makeLeaves();
      scene.add(leaves);

      function makeFireflies() {
        const count = 260;
        const positions = new Float32Array(count * 3);
        const sizes = new Float32Array(count);
        for (let i = 0; i < count; i++) {
          positions[i * 3] = (Math.random() - 0.5) * 13;
          positions[i * 3 + 1] = Math.random() * 7 - 2.5;
          positions[i * 3 + 2] = (Math.random() - 0.5) * 8 - 1.5;
          sizes[i] = Math.random();
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geom.setAttribute("sizeSeed", new THREE.BufferAttribute(sizes, 1));
        const mat = new THREE.PointsMaterial({
          map: softDisc,
          color: 0xdffff0,
          size: 0.09,
          transparent: true,
          opacity: 0.42,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        const points = new THREE.Points(geom, mat);
        scene.add(points);
        return points;
      }
      const fireflies = makeFireflies();

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2(2, 2);

      function spawnSparkle(position) {
        for (let i = 0; i < 18; i++) {
          const sprite = new THREE.Sprite(
            new THREE.SpriteMaterial({
              map: softDisc,
              color: i % 2 ? 0xdffff8 : 0x87edff,
              transparent: true,
              opacity: 0.9,
              depthWrite: false,
              blending: THREE.AdditiveBlending
            })
          );
          sprite.position.copy(position);
          sprite.scale.setScalar(0.12 + Math.random() * 0.12);
          sprite.userData.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 1.5,
            (Math.random() - 0.15) * 1.4,
            (Math.random() - 0.5) * 1.5
          );
          sprite.userData.life = 1;
          scene.add(sprite);
          sparkles.push(sprite);
        }
      }

      function updateCreature(t, dt) {
        const walk = Math.sin(t * 0.48) * 0.72;
        const bob = Math.sin(t * 2.7) * 0.035;
        creature.position.x = 0.36 + walk * 0.2;
        creature.position.z = 0.08 + Math.cos(t * 0.48) * 0.12;
        creature.position.y = 0.1 + mobileLift + bob;
        creature.rotation.y = Math.sin(t * 0.48) * 0.12 + parallax.x * 0.08;
        creature.rotation.z = Math.sin(t * 1.4) * 0.016;
        creature.userData.body.scale.y = 0.96 + Math.sin(t * 2.7) * 0.018;
        creature.userData.body.scale.x = 1.07 - Math.sin(t * 2.7) * 0.014;
        creature.userData.hair.rotation.y = Math.sin(t * 0.62) * 0.04;

        creature.userData.eyes.forEach((eye, i) => {
          const blink = Math.max(0.12, Math.abs(Math.sin(t * 0.74 + i * 0.2)) > 0.965 ? 0.12 : 1);
          eye.scale.y = 1.13 * blink;
          eye.rotation.y = parallax.x * 0.16;
          eye.rotation.x = -parallax.y * 0.12;
        });

        creature.userData.feet.forEach((foot, i) => {
          foot.position.y = -0.89 + Math.sin(t * 5 + i * Math.PI) * 0.026;
          foot.position.z = 0.44 + Math.cos(t * 5 + i * Math.PI) * 0.035;
        });

        creature.userData.antennas.forEach((antenna, index) => {
          const pts = antenna.basePoints.map((p, i) => {
            const np = p.clone();
            np.x += Math.sin(t * 1.55 + i * 0.8 + index) * 0.04 * i;
            np.z += Math.cos(t * 1.35 + i * 0.6) * 0.026 * i;
            return np;
          });
          antenna.line.geometry.setFromPoints(new THREE.CatmullRomCurve3(pts).getPoints(24));
          antenna.plume.position.copy(pts[pts.length - 1]);
          antenna.plume.rotation.z += dt * 0.8 * antenna.side;
        });
      }

      function updateBubbles(t, dt) {
        interactiveBubbles.forEach((bubble, i) => {
          const data = bubble.userData;
          if (!data.alive) {
            data.pop += dt * 2.4;
            bubble.scale.setScalar(Math.max(0.01, 1 - data.pop));
            bubble.traverse((child) => {
              if (child.material) child.material.opacity = Math.max(0, child.material.opacity - dt * 0.8);
            });
            if (data.pop >= 1) {
              data.alive = true;
              data.pop = 0;
              bubble.scale.setScalar(0.01);
              bubble.position.copy(data.base).add(new THREE.Vector3(0, -1.1, 0));
              bubble.traverse((child) => {
                if (child.material) child.material.opacity = child.isSprite ? 0.84 : child.material.wireframe ? 0.24 : 0.24;
              });
            }
            return;
          }
          bubble.position.x = data.base.x + Math.sin(t * data.speed + data.phase) * 0.22;
          bubble.position.y = data.base.y + Math.sin(t * data.speed * 1.7 + data.phase) * 0.38 + ((t * data.speed * 0.12) % 1.5);
          bubble.position.z = data.base.z + Math.cos(t * data.speed + data.phase) * 0.18;
          bubble.rotation.y += dt * (0.1 + i * 0.01);
          bubble.scale.lerp(new THREE.Vector3(1, 1, 1), dt * 2.3);
        });
      }

      function updateSparkles(dt) {
        for (let i = sparkles.length - 1; i >= 0; i--) {
          const s = sparkles[i];
          s.userData.life -= dt * 1.5;
          s.position.addScaledVector(s.userData.velocity, dt);
          s.userData.velocity.y -= dt * 0.25;
          s.material.opacity = Math.max(0, s.userData.life);
          s.scale.multiplyScalar(1 + dt * 0.9);
          if (s.userData.life <= 0) {
            scene.remove(s);
            s.material.dispose();
            sparkles.splice(i, 1);
          }
        }
      }

      function animate(now) {
        requestAnimationFrame(animate);
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        const t = now / 1000;

        parallax.lerp(targetParallax, 0.045);
        controls.autoRotate = !paused && !reducedMotion;
        controls.update();

        if (!paused && !reducedMotion) {
          island.rotation.y = Math.sin(t * 0.16) * 0.035;
          leaves.rotation.z = -0.05 + Math.sin(t * 0.9) * 0.035;
          leaves.rotation.y = -0.25 + parallax.x * 0.12;
          fireflies.rotation.y += dt * 0.018;
          fireflies.position.y = Math.sin(t * 0.32) * 0.08;
          updateCreature(t, dt);
          updateBubbles(t, dt);
          updateSparkles(dt);
          rim.position.x = 3.6 + Math.sin(t * 0.62) * 0.6;
        }

        camera.position.x += parallax.x * 0.012;
        camera.position.y += parallax.y * 0.006;
        renderer.render(scene, camera);
      }

      function resize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const isPhone = w < 700;
        const isTabletPortrait = w < 860 && h > w;
        mobileLift = isPhone ? 1.22 : isTabletPortrait ? 0.58 : 0;
        island.position.y = -0.52 + mobileLift;
        controls.target.set(0, 0.9 + mobileLift * 0.72, 0);
        camera.aspect = w / h;
        camera.position.z = isPhone ? 10.4 : 9.2;
        camera.position.y = isPhone ? 3.05 : isTabletPortrait ? 2.62 : 2.2;
        camera.position.x = 0.1;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }

      function updatePointer(event) {
        const x = event.clientX ?? event.touches?.[0]?.clientX ?? window.innerWidth / 2;
        const y = event.clientY ?? event.touches?.[0]?.clientY ?? window.innerHeight / 2;
        pointer.x = (x / window.innerWidth) * 2 - 1;
        pointer.y = -(y / window.innerHeight) * 2 + 1;
        targetParallax.set(pointer.x, pointer.y);
      }

      function popBubble(event) {
        updatePointer(event);
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(interactiveBubbles, true);
        if (!hits.length) return;
        let bubble = hits[0].object;
        while (bubble.parent && !interactiveBubbles.includes(bubble)) bubble = bubble.parent;
        if (!bubble.userData.alive) return;
        bubble.userData.alive = false;
        spawnSparkle(bubble.position.clone());
      }

      window.addEventListener("resize", resize);
      window.addEventListener("pointermove", updatePointer, { passive: true });
      window.addEventListener(
        "pointerdown",
        (event) => {
          updatePointer(event);
          pointerDown = { x: event.clientX, y: event.clientY, time: performance.now(), id: event.pointerId };
        },
        { passive: true }
      );
      window.addEventListener("pointerup", (event) => {
        if (!pointerDown || pointerDown.id !== event.pointerId) return;
        const dx = event.clientX - pointerDown.x;
        const dy = event.clientY - pointerDown.y;
        const distance = Math.hypot(dx, dy);
        const elapsed = performance.now() - pointerDown.time;
        pointerDown = null;
        if (distance < 12 && elapsed < 420) popBubble(event);
      });
      window.addEventListener("pointercancel", () => {
        pointerDown = null;
      });
      prefersReducedMotion.addEventListener("change", (event) => {
        reducedMotion = event.matches;
        paused = event.matches;
      });

      resize();
      requestAnimationFrame(animate);
      setTimeout(() => loading.classList.add("hide"), 450);
    </script>
  </body>
</html>
