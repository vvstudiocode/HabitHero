  <main>
    <p>HabitHero · Data deletion</p>
    <h1>刪除 HabitHero 帳號與資料</h1>
    <p>如果你已安裝 HabitHero，請登入家長帳號，在「設定 → 刪除帳號與資料」完成刪除。這會刪除家長帳號、家庭、孩子帳號、任務、心得、獎勵、點數與兌換紀錄。</p>
    <p>如果你無法登入，請使用下方 Email 提出刪除請求。我們會驗證家長帳號後處理：</p>
    <p><a href="mailto:vvstudiocode@gmail.com?subject=HabitHero%20帳號刪除請求">寄送帳號刪除請求</a></p>
    <p>請勿在 Email 中提供密碼或孩子的完整敏感資料。刪除完成後通常無法復原。</p>
    <p><a href="/">返回 HabitHero</a></p>
  </main>
